<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 680" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <marker id="arr-red" markerWidth="8" markerHeight="6" refX="7.5" refY="3" orient="auto" markerUnits="strokeWidth">
      <polygon points="0 0.5,7.5 3,0 5.5" fill="#E53935"/>
    </marker>
    <marker id="arr-blue" markerWidth="8" markerHeight="6" refX="7.5" refY="3" orient="auto" markerUnits="strokeWidth">
      <polygon points="0 0.5,7.5 3,0 5.5" fill="#1565C0"/>
    </marker>
    <marker id="arr-grey" markerWidth="7" markerHeight="5" refX="6.5" refY="2.5" orient="auto" markerUnits="strokeWidth">
      <polygon points="0 0.5,6.5 2.5,0 4.5" fill="#9E9E9E"/>
    </marker>
    <filter id="sh" x="-3%" y="-3%" width="106%" height="106%">
      <feDropShadow dx="1" dy="1" stdDeviation="1.8" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- Title -->
  <text x="370" y="26" text-anchor="middle" font-size="16" font-weight="bold" fill="#1a1a1a">Heterogeneous Bipartite Graph Encoding of Recon3D</text>
  <text x="370" y="44" text-anchor="middle" font-size="11" fill="#777" font-style="italic">Glycolysis subnetwork example (6 reactions, 7 metabolites)</text>

  <!-- Panel A label -->
  <text x="28" y="72" font-size="13" font-weight="bold" fill="#333">(a) Subnetwork graph structure</text>

  <!-- ══════════ METABOLITE NODES ══════════ -->
  <circle cx="60" cy="200" r="26" fill="#26A69A" filter="url(#sh)"/>
  <text x="60" y="196" text-anchor="middle" font-size="9" font-weight="bold" fill="#FFF">Glc</text>
  <text x="60" y="208" text-anchor="middle" font-size="7" fill="#B2DFDB">glucose</text>

  <circle cx="210" cy="120" r="26" fill="#26A69A" filter="url(#sh)"/>
  <text x="210" y="117" text-anchor="middle" font-size="9" font-weight="bold" fill="#FFF">G6P</text>
  <text x="210" y="129" text-anchor="middle" font-size="7" fill="#B2DFDB">glc-6-P</text>

  <circle cx="210" cy="290" r="26" fill="#26A69A" filter="url(#sh)"/>
  <text x="210" y="287" text-anchor="middle" font-size="9" font-weight="bold" fill="#FFF">F6P</text>
  <text x="210" y="299" text-anchor="middle" font-size="7" fill="#B2DFDB">fru-6-P</text>

  <circle cx="380" cy="200" r="26" fill="#26A69A" filter="url(#sh)"/>
  <text x="380" y="197" text-anchor="middle" font-size="9" font-weight="bold" fill="#FFF">FBP</text>
  <text x="380" y="209" text-anchor="middle" font-size="7" fill="#B2DFDB">fru-1,6-bP</text>

  <circle cx="530" cy="120" r="26" fill="#26A69A" filter="url(#sh)"/>
  <text x="530" y="117" text-anchor="middle" font-size="9" font-weight="bold" fill="#FFF">G3P</text>
  <text x="530" y="129" text-anchor="middle" font-size="7" fill="#B2DFDB">glyc-3-P</text>

  <circle cx="530" cy="290" r="26" fill="#26A69A" filter="url(#sh)"/>
  <text x="530" y="287" text-anchor="middle" font-size="9" font-weight="bold" fill="#FFF">DHAP</text>
  <text x="530" y="299" text-anchor="middle" font-size="7" fill="#B2DFDB">DHAP</text>

  <circle cx="660" cy="200" r="26" fill="#26A69A" filter="url(#sh)"/>
  <text x="660" y="197" text-anchor="middle" font-size="9" font-weight="bold" fill="#FFF">PEP</text>
  <text x="660" y="209" text-anchor="middle" font-size="7" fill="#B2DFDB">PEP</text>

  <!-- ══════════ CURRENCY METABOLITES ══════════ -->
  <circle cx="120" cy="380" r="22" fill="#FFCA28" stroke="#F57F17" stroke-width="1.8" filter="url(#sh)"/>
  <text x="120" y="377" text-anchor="middle" font-size="10" font-weight="bold" fill="#4E342E">ATP</text>
  <text x="120" y="390" text-anchor="middle" font-size="7" fill="#6D4C41">0.1× wt</text>

  <circle cx="310" cy="380" r="22" fill="#FFCA28" stroke="#F57F17" stroke-width="1.8" filter="url(#sh)"/>
  <text x="310" y="377" text-anchor="middle" font-size="10" font-weight="bold" fill="#4E342E">ADP</text>
  <text x="310" y="390" text-anchor="middle" font-size="7" fill="#6D4C41">0.1× wt</text>

  <!-- ══════════ REACTION NODES ══════════ -->
  <rect x="112" y="148" width="50" height="40" rx="7" fill="#5C6BC0" filter="url(#sh)"/>
  <text x="137" y="166" text-anchor="middle" font-size="9" font-weight="bold" fill="#FFF">HK</text>
  <text x="137" y="178" text-anchor="middle" font-size="6.5" fill="#C5CAE9">2.3.1.1</text>

  <rect x="185" y="190" width="50" height="40" rx="7" fill="#5C6BC0" filter="url(#sh)"/>
  <text x="210" y="208" text-anchor="middle" font-size="9" font-weight="bold" fill="#FFF">GPI</text>
  <text x="210" y="220" text-anchor="middle" font-size="6.5" fill="#C5CAE9">5.3.1.9</text>

  <rect x="270" y="260" width="50" height="40" rx="7" fill="#5C6BC0" filter="url(#sh)"/>
  <text x="295" y="278" text-anchor="middle" font-size="9" font-weight="bold" fill="#FFF">PFK</text>
  <text x="295" y="290" text-anchor="middle" font-size="6.5" fill="#C5CAE9">2.7.1.11</text>

  <rect x="430" y="180" width="50" height="40" rx="7" fill="#5C6BC0" filter="url(#sh)"/>
  <text x="455" y="198" text-anchor="middle" font-size="9" font-weight="bold" fill="#FFF">ALDO</text>
  <text x="455" y="210" text-anchor="middle" font-size="6.5" fill="#C5CAE9">4.1.2.13</text>

  <rect x="555" y="190" width="50" height="40" rx="7" fill="#5C6BC0" filter="url(#sh)"/>
  <text x="580" y="208" text-anchor="middle" font-size="9" font-weight="bold" fill="#FFF">TPI</text>
  <text x="580" y="220" text-anchor="middle" font-size="6.5" fill="#C5CAE9">5.3.1.1</text>

  <rect x="685" y="248" width="50" height="40" rx="7" fill="#5C6BC0" filter="url(#sh)"/>
  <text x="710" y="266" text-anchor="middle" font-size="9" font-weight="bold" fill="#FFF">PK</text>
  <text x="710" y="278" text-anchor="middle" font-size="6.5" fill="#C5CAE9">2.7.1.40</text>

  <!-- ══════════ substrate_of EDGES (red curves, met→rxn) ══════════ -->
  <!-- Glc → HK -->
  <path d="M 86,194 C 96,186 104,176 112,170" fill="none" stroke="#E53935" stroke-width="1.8" marker-end="url(#arr-red)"/>
  <!-- G6P → GPI -->
  <path d="M 210,146 C 210,162 210,176 210,188" fill="none" stroke="#E53935" stroke-width="1.8" marker-end="url(#arr-red)"/>
  <!-- F6P → PFK -->
  <path d="M 234,282 C 248,278 258,274 270,272" fill="none" stroke="#E53935" stroke-width="1.8" marker-end="url(#arr-red)"/>
  <!-- FBP → ALDO -->
  <path d="M 406,196 C 414,194 420,192 430,192" fill="none" stroke="#E53935" stroke-width="1.8" marker-end="url(#arr-red)"/>
  <!-- DHAP → TPI -->
  <path d="M 546,272 C 558,256 566,242 574,230" fill="none" stroke="#E53935" stroke-width="1.8" marker-end="url(#arr-red)"/>
  <!-- PEP → PK -->
  <path d="M 678,218 C 688,232 696,242 702,248" fill="none" stroke="#E53935" stroke-width="1.8" marker-end="url(#arr-red)"/>

  <!-- ══════════ produces EDGES (blue curves, rxn→met) ══════════ -->
  <!-- HK → G6P -->
  <path d="M 156,148 C 168,138 186,130 192,128" fill="none" stroke="#1565C0" stroke-width="1.8" marker-end="url(#arr-blue)"/>
  <!-- GPI → F6P -->
  <path d="M 210,230 C 210,248 210,258 210,264" fill="none" stroke="#1565C0" stroke-width="1.8" marker-end="url(#arr-blue)"/>
  <!-- PFK → FBP -->
  <path d="M 320,268 C 336,248 350,224 358,218" fill="none" stroke="#1565C0" stroke-width="1.8" marker-end="url(#arr-blue)"/>
  <!-- ALDO → G3P -->
  <path d="M 452,180 C 450,158 510,146 506,142" fill="none" stroke="#1565C0" stroke-width="1.8" marker-end="url(#arr-blue)"/>
  <!-- ALDO → DHAP -->
  <path d="M 468,220 C 478,250 508,272 510,276" fill="none" stroke="#1565C0" stroke-width="1.8" marker-end="url(#arr-blue)"/>
  <!-- TPI → G3P -->
  <path d="M 570,190 C 564,168 550,150 552,144" fill="none" stroke="#1565C0" stroke-width="1.8" marker-end="url(#arr-blue)"/>

  <!-- ══════════ CURRENCY EDGES (grey dashed) ══════════ -->
  <!-- ATP → HK -->
  <path d="M 126,358 C 130,310 132,240 134,190" fill="none" stroke="#9E9E9E" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arr-grey)"/>
  <!-- ATP → PFK -->
  <path d="M 140,370 C 195,358 252,328 278,300" fill="none" stroke="#9E9E9E" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arr-grey)"/>
  <!-- HK → ADP -->
  <path d="M 152,188 C 190,260 262,340 290,368" fill="none" stroke="#9E9E9E" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arr-grey)"/>
  <!-- PFK → ADP -->
  <path d="M 302,300 C 306,330 308,350 310,358" fill="none" stroke="#9E9E9E" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arr-grey)"/>

  <!-- Downstream dots -->
  <circle cx="742" cy="280" r="2.5" fill="#888"/>
  <circle cx="752" cy="286" r="2.5" fill="#888"/>
  <circle cx="762" cy="292" r="2.5" fill="#888"/>

  <!-- ══════════ LEGEND ══════════ -->
  <rect x="760" y="80" width="220" height="195" rx="8" fill="#FAFAFA" stroke="#E0E0E0" stroke-width="1"/>
  <text x="870" y="102" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">Legend</text>

  <rect x="776" y="114" width="16" height="13" rx="3" fill="#5C6BC0"/>
  <text x="800" y="124" font-size="9" fill="#333">Reaction node (V_R)</text>

  <circle cx="784" cy="143" r="7" fill="#26A69A"/>
  <text x="800" y="147" font-size="9" fill="#333">Metabolite node (V_M)</text>

  <circle cx="784" cy="168" r="7" fill="#FFCA28" stroke="#F57F17" stroke-width="1.2"/>
  <text x="800" y="172" font-size="9" fill="#333">Currency met (0.1× wt)</text>

  <line x1="773" y1="195" x2="793" y2="195" stroke="#E53935" stroke-width="2"/>
  <polygon points="793,192 800,195 793,198" fill="#E53935"/>
  <text x="808" y="199" font-size="9" fill="#333">substrate_of</text>

  <line x1="773" y1="218" x2="793" y2="218" stroke="#1565C0" stroke-width="2"/>
  <polygon points="793,215 800,218 793,221" fill="#1565C0"/>
  <text x="808" y="222" font-size="9" fill="#333">produces</text>

  <line x1="773" y1="241" x2="793" y2="241" stroke="#9E9E9E" stroke-width="1.2" stroke-dasharray="5,3"/>
  <polygon points="793,238.5 799,241 793,243.5" fill="#9E9E9E"/>
  <text x="808" y="245" font-size="9" fill="#333">currency (0.1×)</text>

  <text x="870" y="268" text-anchor="middle" font-size="8.5" fill="#888" font-style="italic">Two-hop: R₁ → M → R₂</text>

  <!-- ══════════ PANEL B ══════════ -->
  <line x1="28" y1="430" x2="972" y2="430" stroke="#E0E0E0" stroke-width="1"/>
  <text x="28" y="456" font-size="13" font-weight="bold" fill="#333">(b) Node feature structure</text>

  <!-- Reaction features -->
  <rect x="35" y="470" width="420" height="155" rx="10" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.3"/>
  <text x="245" y="494" text-anchor="middle" font-size="12" font-weight="bold" fill="#5B21B6">Reaction Node Features</text>
  <text x="245" y="510" text-anchor="middle" font-size="10" fill="#7E57C2">X_R  ∈  ℝ ^(n_rxn × 2)</text>

  <rect x="55" y="522" width="180" height="90" rx="6" fill="#E8EAF6" stroke="#5C6BC0" stroke-width="1"/>
  <text x="145" y="540" text-anchor="middle" font-size="10" font-weight="bold" fill="#283593">Col 0: RNA-seq</text>
  <text x="145" y="556" text-anchor="middle" font-size="8.5" fill="#555">GPR( log₂(TPM + 1) )</text>
  <text x="145" y="570" text-anchor="middle" font-size="8.5" fill="#555">AND → min, OR → max</text>
  <text x="145" y="584" text-anchor="middle" font-size="8.5" fill="#555">Quantile normalised</text>
  <text x="145" y="601" text-anchor="middle" font-size="8.5" font-weight="bold" fill="#2E7D32">✓ 690 patients</text>

  <rect x="255" y="522" width="180" height="90" rx="6" fill="#FFF3E0" stroke="#E65100" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="345" y="540" text-anchor="middle" font-size="10" font-weight="bold" fill="#BF360C">Col 1: Proteomics*</text>
  <text x="345" y="556" text-anchor="middle" font-size="8.5" fill="#555">GPR( log₂(abundance) )</text>
  <text x="345" y="570" text-anchor="middle" font-size="8.5" fill="#555">Same aggregation rules</text>
  <text x="345" y="584" text-anchor="middle" font-size="8.5" fill="#555">Reserved channel</text>
  <text x="345" y="601" text-anchor="middle" font-size="8.5" font-weight="bold" fill="#C62828">⓪ Zero-filled (this release)</text>

  <!-- Metabolite features -->
  <rect x="500" y="470" width="470" height="155" rx="10" fill="#E0F2F1" stroke="#00897B" stroke-width="1.3"/>
  <text x="735" y="494" text-anchor="middle" font-size="12" font-weight="bold" fill="#00695C">Metabolite Node Features</text>
  <text x="735" y="510" text-anchor="middle" font-size="10" fill="#00897B">X_M  ∈  ℝ ^(n_met × 519)   —   patient-invariant</text>

  <rect x="520" y="522" width="140" height="90" rx="6" fill="#B2DFDB" stroke="#26A69A" stroke-width="1"/>
  <text x="590" y="540" text-anchor="middle" font-size="10" font-weight="bold" fill="#004D40">7 physico-chem</text>
  <text x="590" y="558" text-anchor="middle" font-size="8.5" fill="#555">MW, LogP, HBA</text>
  <text x="590" y="572" text-anchor="middle" font-size="8.5" fill="#555">HBD, TPSA</text>
  <text x="590" y="586" text-anchor="middle" font-size="8.5" fill="#555">RingCount</text>
  <text x="590" y="600" text-anchor="middle" font-size="8.5" fill="#555">FormalCharge</text>

  <text x="675" y="570" text-anchor="middle" font-size="20" fill="#666" font-weight="bold">+</text>

  <rect x="700" y="522" width="250" height="90" rx="6" fill="#B2DFDB" stroke="#26A69A" stroke-width="1"/>
  <text x="825" y="540" text-anchor="middle" font-size="10" font-weight="bold" fill="#004D40">512-bit Morgan Fingerprints</text>
  <text x="825" y="558" text-anchor="middle" font-size="8.5" fill="#555">RDKit (radius = 2, nBits = 512)</text>
  <text x="825" y="572" text-anchor="middle" font-size="8.5" fill="#555">from ChEBI SMILES strings</text>
  <text x="825" y="590" text-anchor="middle" font-size="8.5" fill="#888" font-style="italic">Shared across all patients</text>

  <!-- Footnote -->
  <text x="500" y="656" text-anchor="middle" font-size="9" fill="#999" font-style="italic">*Proteomic channel zero-filled in this release; architecture supports integration when matched quantitative data become available.</text>
</svg>
